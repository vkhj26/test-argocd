apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-valeria
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.bitnami.com/bitnami'
    targetRevision: 19.1.1
    chart: redis
    helm:
      values: |
        image:
          tag: latest
        auth:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default