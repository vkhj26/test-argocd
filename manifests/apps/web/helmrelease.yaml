apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-valeria
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.bitnami.com/bitnami'
    targetRevision: 15.0.0
    chart: nginx
    helm:
      values: |
        staticSiteConfig:
          enabled: true
          content: "<h1>¡Hola Valeria!</h1><p>Desplegado con ArgoCD.</p>"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default