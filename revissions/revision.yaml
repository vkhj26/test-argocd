apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: master-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/vkhj26/test-argocd.git'
    targetRevision: HEAD
    path: manifests/apps/_overlays
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true